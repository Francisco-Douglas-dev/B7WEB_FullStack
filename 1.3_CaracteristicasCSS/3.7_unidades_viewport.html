<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unidades relativas (viewport)</title>
  <!-- vw, vh, vmin, vmax -->
  <style>
    .vw-box { width: 50vw; height: 20vh; background:#cfe8ff; }
    .vmin-box { width: 50vmin; background:#ffdede; }
  </style>
</head>
<body>
  <h1>Unidades de viewport</h1>
  <div class="vw-box">Box com largura 50vw e altura 20vh</div>
  <div class="vmin-box">Box com largura 50vmin</div>
  <p>Dica: úteis para layouts responsivos baseados na viewport.</p>
</body>
</html>
