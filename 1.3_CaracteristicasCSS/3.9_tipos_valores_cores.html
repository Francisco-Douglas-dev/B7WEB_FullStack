<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tipos de valores para cores</title>
  <!-- hex, rgb, rgba, hsl, hsla, nomes de cores -->
  <style>
    .hex { background:#ffcc00; padding:8px; }
    .rgb { background:rgb(34,139,34); color:#fff; padding:8px; }
    .rgba { background:rgba(255,0,0,0.6); padding:8px; }
    .hsl { background:hsl(200,100%,50%); padding:8px; }
  </style>
</head>
<body>
  <h1>Tipos de valores para cores</h1>
  <p class="hex">HEX: #ffcc00</p>
  <p class="rgb">RGB: rgb(34,139,34)</p>
  <p class="rgba">RGBA (com alpha): rgba(255,0,0,0.6)</p>
  <p class="hsl">HSL: hsl(200,100%,50%)</p>
  <p>Dica: use RGBA/HSLA quando precisar de transparência.</p>
</body>
</html>
