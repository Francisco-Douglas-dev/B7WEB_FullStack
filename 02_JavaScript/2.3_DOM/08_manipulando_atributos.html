<!-- Aula: Manipulando atributos -->
<!-- Podemos alterar atributos de elementos -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Manipulando Atributos</title>
</head>
<body>
    <img id="imagem" src="https://via.placeholder.com/100" alt="Imagem">
    <button onclick="trocarImagem()">Trocar imagem</button>
    <script>
        function trocarImagem() {
            document.getElementById('imagem').setAttribute('src', 'https://via.placeholder.com/150');
        }
    </script>
</body>
</html>
