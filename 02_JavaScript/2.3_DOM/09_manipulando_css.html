<!-- Aula: Manipulando o CSS -->
<!-- Podemos alterar estilos CSS via JavaScript -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Manipulando CSS</title>
</head>
<body>
    <p id="texto">Texto colorido</p>
    <button onclick="mudarCor()">Mudar cor</button>
    <script>
        function mudarCor() {
            document.getElementById('texto').style.color = 'red';
        }
    </script>
</body>
</html>
