<!-- Aula: Selecionando elementos 1 -->
<!-- Podemos selecionar elementos pelo ID usando getElementById -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Selecionando Elementos 1</title>
</head>
<body>
    <h1 id="titulo">Título da Página</h1>
    <script>
        // Selecionando pelo ID
        var elemento = document.getElementById('titulo');
        console.log(elemento.textContent);
    </script>
</body>
</html>
