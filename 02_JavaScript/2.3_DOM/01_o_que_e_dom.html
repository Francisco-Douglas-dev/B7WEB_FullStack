<!-- Aula: O que é DOM? -->
<!-- DOM (Document Object Model) é a representação do HTML como objetos em árvore, permitindo manipulação via JavaScript. -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>O que é DOM?</title>
</head>
<body>
    <h1>Exemplo de DOM</h1>
    <p>Abra o console do navegador e veja o objeto <code>document</code>.</p>
    <script>
        // O objeto document representa toda a página
        console.log(document);
    </script>
</body>
</html>
