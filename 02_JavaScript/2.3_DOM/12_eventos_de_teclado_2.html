<!-- Aula: Eventos de teclado 2 -->
<!-- Podemos reagir ao pressionar Enter -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eventos de Teclado 2</title>
</head>
<body>
    <input id="campo" type="text" placeholder="Pressione Enter">
    <script>
        document.getElementById('campo').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                alert('Você pressionou Enter!');
            }
        });
    </script>
</body>
</html>
