<!-- Aula: Eventos de clique -->
<!-- Podemos reagir a cliques com addEventListener -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eventos de Clique</title>
</head>
<body>
    <button id="botao">Clique aqui</button>
    <script>
        document.getElementById('botao').addEventListener('click', function() {
            alert('Botão clicado!');
        });
    </script>
</body>
</html>
