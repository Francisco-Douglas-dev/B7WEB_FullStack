<!-- Aula: Inserindo o arquivo JS na página -->
<!-- Para usar JavaScript em uma página HTML, utilize a tag <script> -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inserindo JS</title>
</head>
<body>
    <h1>Exemplo de inclusão de JavaScript</h1>
    <!-- Incluindo um arquivo JS externo -->
    <script src="exemplo.js"></script>
</body>
</html>
<!-- O arquivo exemplo.js deve estar na mesma pasta deste HTML -->
