<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>O que é e como usar o CSS? (1/2)</title>
  <!-- Aula: Introdução ao CSS - o que é e como aplicar estilos -->
</head>
<body>
  <h1>O que é CSS?</h1>
  <p>CSS é a linguagem para estilizar documentos HTML (cores, layout, fontes).</p>

  <h2>Como aplicar CSS</h2>
  <p>Existem três formas: inline, interno (style) e externo (arquivo .css).</p>

  <h3>Exemplo inline</h3>
  <p style="color:blue;">Texto com estilo inline (cor azul).</p>

</body>
</html>
