<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tags Básicas (2/2)</title>
  <!-- Aula: Tags Básicas (2/2) - listas, imagens e linhas de separação -->
</head>
<body>
  <h1>Tags Básicas (2/2)</h1>

  <h2>Listas</h2>
  <ul>
    <li>Item A</li>
    <li>Item B</li>
  </ul>

  <h2>Imagem</h2>
  <p>Inclua sempre o atributo <code>alt</code>:</p>
  <img src="placeholder.jpg" alt="Exemplo de imagem" width="200">

  <h2>Separador</h2>
  <p>Use <code>&lt;hr&gt;</code> para separar seções.</p>
  <hr>
</body>
</html>
