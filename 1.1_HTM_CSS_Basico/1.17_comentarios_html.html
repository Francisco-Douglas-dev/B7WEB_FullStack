<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comentários no HTML</title>
  <!-- Aula: Comentários no HTML (<!-- comentário -->) -->
</head>
<body>
  <h1>Comentários no HTML</h1>
  <!-- Este comentário é visível apenas no código fonte, não no navegador -->
  <p>Use comentários para documentar trechos de código ou desativar temporariamente elementos.</p>

  <h2>Exemplo:</h2>
  <!-- <p>Parágrafo comentado: este não aparece.</p> -->
  <p>Parágrafo ativo: este aparece.</p>
</body>
</html>
