<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Oque e uma Tag?</h1>

    <!-- Tag é um elemento HTML que define a estrutura e o conteúdo de uma página web. -->

    <h2>Oque São Atributos?</h2>

    <!-- Atributos são informações adicionais que podem ser adicionadas a uma tag para fornecer mais detalhes ou controlar seu comportamento. -->

    <a href="https://www.google.com">Site do Google</a>
</body>
</html>
