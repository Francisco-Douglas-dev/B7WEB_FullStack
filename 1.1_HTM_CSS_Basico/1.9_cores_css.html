<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cores no CSS</title>
  <!-- Aula: Usar cores com nomes, hex, rgb e rgba -->
  <style>
    .nome { color: red; }
    .hex { color: #1e90ff; }
    .rgb { color: rgb(34,139,34); }
    .rgba { color: rgba(255,0,0,0.6); }
  </style>
</head>
<body>
  <h1>Cores no CSS</h1>
  <p class="nome">Usando nome da cor: red</p>
  <p class="hex">Usando HEX: #1e90ff</p>
  <p class="rgb">Usando RGB: rgb(34,139,34)</p>
  <p class="rgba">Usando RGBA (transparência): rgba(255,0,0,0.6)</p>
</body>
</html>
