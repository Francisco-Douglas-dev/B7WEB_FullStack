<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Width/Height no CSS</title>
  <!-- Aula: Usar width/height com valores em px e % -->
  <style>
    .fixo { width:200px; height:100px; background:#ffd54f; }
    .percent { width:50%; height:80px; background:#b39ddb; }
  </style>
</head>
<body>
  <h1>Width e Height</h1>
  <div class="fixo">Box com tamanho fixo</div>
  <div class="percent">Box com largura em % (50%)</div>
</body>
</html>
