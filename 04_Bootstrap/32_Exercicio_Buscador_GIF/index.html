<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício: Buscador de GIF</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .search-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
            margin-bottom: 30px;
        }
        .gif-card {
            overflow: hidden;
            border-radius: 10px;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .gif-card:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .gif-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .spinner-container {
            display: flex;
            justify-content: center;
            padding: 50px;
        }
        .trending-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.9);
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 
        AULA 32: EXERCÍCIO BUSCADOR DE GIF
        Este exercício demonstra:
        - Input Group para busca
        - Grid responsivo para exibir resultados
        - Cards para cada GIF
        - Modal para visualização ampliada
        - Spinner de carregamento
        - Badges e alertas
        - Integração com API (simulada neste exemplo)
    -->

    <div class="container">
        <!-- Header -->
        <div class="text-center text-white mb-4">
            <h1 class="display-3 fw-bold">🎬 GIF Finder</h1>
            <p class="lead">Busque e encontre os melhores GIFs!</p>
        </div>

        <!-- Container de Busca -->
        <div class="search-container">
            <form onsubmit="searchGifs(event)">
                <div class="input-group input-group-lg">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="form-control" 
                        placeholder="Digite sua busca... (ex: gatos, feliz, dança)"
                        aria-label="Buscar GIFs"
                    >
                    <button class="btn btn-primary" type="submit">
                        🔍 Buscar
                    </button>
                </div>
            </form>

            <!-- Sugestões -->
            <div class="mt-3">
                <span class="text-muted me-2">Sugestões:</span>
                <button class="btn btn-sm btn-outline-secondary me-2" onclick="quickSearch('gatos')">Gatos</button>
                <button class="btn btn-sm btn-outline-secondary me-2" onclick="quickSearch('cachorro')">Cachorros</button>
                <button class="btn btn-sm btn-outline-secondary me-2" onclick="quickSearch('feliz')">Feliz</button>
                <button class="btn btn-sm btn-outline-secondary me-2" onclick="quickSearch('dança')">Dança</button>
                <button class="btn btn-sm btn-outline-secondary" onclick="quickSearch('amor')">Amor</button>
            </div>
        </div>

        <!-- Área de Alertas -->
        <div id="alertContainer"></div>

        <!-- Spinner de Carregamento -->
        <div id="loadingSpinner" class="spinner-container d-none">
            <div class="spinner-border text-light" style="width: 4rem; height: 4rem;" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
        </div>

        <!-- Grid de Resultados -->
        <div id="resultsContainer" class="row g-4">
            <!-- GIFs serão inseridos aqui dinamicamente -->
        </div>

        <!-- Mensagem de Nenhum Resultado -->
        <div id="noResults" class="text-center text-white d-none">
            <div class="py-5">
                <h3>😕 Nenhum GIF encontrado</h3>
                <p>Tente buscar por outra palavra-chave</p>
            </div>
        </div>
    </div>

    <!-- Modal para Visualização Ampliada -->
    <div class="modal fade" id="gifModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="gifModalTitle">GIF</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalGifImage" src="" class="img-fluid rounded" alt="GIF">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-primary" onclick="copyGifLink()">📋 Copiar Link</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Simulação de dados de GIFs (em produção, viria de uma API como Giphy)
        const mockGifs = {
            gatos: [
                { id: 1, url: 'https://via.placeholder.com/300x200/ff6b6b/ffffff?text=Gato+1', title: 'Gato Fofo 1' },
                { id: 2, url: 'https://via.placeholder.com/300x200/4ecdc4/ffffff?text=Gato+2', title: 'Gato Fofo 2' },
                { id: 3, url: 'https://via.placeholder.com/300x200/95e1d3/ffffff?text=Gato+3', title: 'Gato Fofo 3' },
                { id: 4, url: 'https://via.placeholder.com/300x200/f38181/ffffff?text=Gato+4', title: 'Gato Fofo 4' },
                { id: 5, url: 'https://via.placeholder.com/300x200/aa96da/ffffff?text=Gato+5', title: 'Gato Fofo 5' },
                { id: 6, url: 'https://via.placeholder.com/300x200/fcbad3/ffffff?text=Gato+6', title: 'Gato Fofo 6' }
            ],
            cachorro: [
                { id: 7, url: 'https://via.placeholder.com/300x200/a8e6cf/ffffff?text=Cachorro+1', title: 'Cachorro Legal 1' },
                { id: 8, url: 'https://via.placeholder.com/300x200/ffd3b6/ffffff?text=Cachorro+2', title: 'Cachorro Legal 2' },
                { id: 9, url: 'https://via.placeholder.com/300x200/ffaaa5/ffffff?text=Cachorro+3', title: 'Cachorro Legal 3' },
                { id: 10, url: 'https://via.placeholder.com/300x200/ff8b94/ffffff?text=Cachorro+4', title: 'Cachorro Legal 4' }
            ],
            feliz: [
                { id: 11, url: 'https://via.placeholder.com/300x200/feca57/ffffff?text=Feliz+1', title: 'Felicidade 1' },
                { id: 12, url: 'https://via.placeholder.com/300x200/48dbfb/ffffff?text=Feliz+2', title: 'Felicidade 2' },
                { id: 13, url: 'https://via.placeholder.com/300x200/ff9ff3/ffffff?text=Feliz+3', title: 'Felicidade 3' }
            ],
            dança: [
                { id: 14, url: 'https://via.placeholder.com/300x200/54a0ff/ffffff?text=Danca+1', title: 'Dançando 1' },
                { id: 15, url: 'https://via.placeholder.com/300x200/00d2d3/ffffff?text=Danca+2', title: 'Dançando 2' }
            ],
            amor: [
                { id: 16, url: 'https://via.placeholder.com/300x200/ee5a6f/ffffff?text=Amor+1', title: 'Amor 1' },
                { id: 17, url: 'https://via.placeholder.com/300x200/f368e0/ffffff?text=Amor+2', title: 'Amor 2' },
                { id: 18, url: 'https://via.placeholder.com/300x200/ff6348/ffffff?text=Amor+3', title: 'Amor 3' }
            ]
        };

        let currentGifUrl = '';

        function searchGifs(event) {
            event.preventDefault();
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!searchTerm) {
                showAlert('Por favor, digite algo para buscar!', 'warning');
                return;
            }

            performSearch(searchTerm);
        }

        function quickSearch(term) {
            document.getElementById('searchInput').value = term;
            performSearch(term);
        }

        function performSearch(term) {
            // Mostra loading
            document.getElementById('loadingSpinner').classList.remove('d-none');
            document.getElementById('resultsContainer').innerHTML = '';
            document.getElementById('noResults').classList.add('d-none');
            document.getElementById('alertContainer').innerHTML = '';

            // Simula delay de API
            setTimeout(() => {
                const results = mockGifs[term] || [];
                
                document.getElementById('loadingSpinner').classList.add('d-none');

                if (results.length === 0) {
                    document.getElementById('noResults').classList.remove('d-none');
                    return;
                }

                displayResults(results, term);
                showAlert(`${results.length} GIFs encontrados para "${term}"!`, 'success');
            }, 1000);
        }

        function displayResults(gifs, searchTerm) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            gifs.forEach((gif, index) => {
                const col = document.createElement('div');
                col.className = 'col-md-4';
                
                const isTrending = index === 0;
                
                col.innerHTML = `
                    <div class="card gif-card h-100" onclick="openGifModal('${gif.url}', '${gif.title}')">
                        <div class="position-relative">
                            ${isTrending ? '<span class="trending-badge">🔥 Trending</span>' : ''}
                            <img src="${gif.url}" class="gif-img" alt="${gif.title}">
                        </div>
                        <div class="card-body">
                            <h6 class="card-title">${gif.title}</h6>
                            <div class="d-flex justify-content-between align-items-center">
                                <small class="text-muted">#${searchTerm}</small>
                                <span class="badge bg-primary">GIF</span>
                            </div>
                        </div>
                    </div>
                `;
                
                container.appendChild(col);
            });
        }

        function openGifModal(url, title) {
            currentGifUrl = url;
            document.getElementById('modalGifImage').src = url;
            document.getElementById('gifModalTitle').textContent = title;
            new bootstrap.Modal(document.getElementById('gifModal')).show();
        }

        function copyGifLink() {
            navigator.clipboard.writeText(currentGifUrl).then(() => {
                showAlert('Link copiado para a área de transferência! 📋', 'success');
            });
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;

            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 3000);
        }

        // Carrega GIFs trending ao iniciar
        window.addEventListener('load', () => {
            quickSearch('gatos');
        });
    </script>
</body>
</html>
