<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício: Quiz Interativo</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .quiz-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .option-btn {
            transition: all 0.3s;
        }
        .option-btn:hover {
            transform: translateX(10px);
        }
        .correct {
            background-color: #28a745 !important;
            color: white !important;
        }
        .incorrect {
            background-color: #dc3545 !important;
            color: white !important;
        }
        .progress-custom {
            height: 8px;
        }
    </style>
</head>
<body>
    <!-- 
        AULA 31: EXERCÍCIO QUIZ INTERATIVO
        Este exercício demonstra:
        - Sistema de perguntas e respostas
        - Feedback visual (correto/incorreto)
        - Barra de progresso
        - Placar final
        - Uso de cards, badges, botões e alertas
    -->

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="quiz-container p-5">
                    <!-- Cabeçalho -->
                    <div class="text-center mb-4">
                        <h1 class="display-4">🧠 Quiz de Conhecimentos</h1>
                        <p class="text-muted">Teste seus conhecimentos sobre Bootstrap!</p>
                    </div>

                    <!-- Barra de Progresso -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="badge bg-primary">Questão <span id="currentQuestion">1</span> de 5</span>
                            <span class="badge bg-success">Pontos: <span id="score">0</span></span>
                        </div>
                        <div class="progress progress-custom">
                            <div id="progressBar" class="progress-bar" role="progressbar" style="width: 20%"></div>
                        </div>
                    </div>

                    <!-- Card da Questão -->
                    <div id="quizCard" class="card border-0 shadow-sm mb-4">
                        <div class="card-body">
                            <h4 class="card-title mb-4" id="questionText">
                                O que significa Bootstrap?
                            </h4>
                            <div class="d-grid gap-3" id="optionsContainer">
                                <button class="btn btn-outline-primary btn-lg text-start option-btn" onclick="checkAnswer(this, false)">
                                    A) Um sistema operacional
                                </button>
                                <button class="btn btn-outline-primary btn-lg text-start option-btn" onclick="checkAnswer(this, true)">
                                    B) Um framework CSS para desenvolvimento web
                                </button>
                                <button class="btn btn-outline-primary btn-lg text-start option-btn" onclick="checkAnswer(this, false)">
                                    C) Uma linguagem de programação
                                </button>
                                <button class="btn btn-outline-primary btn-lg text-start option-btn" onclick="checkAnswer(this, false)">
                                    D) Um banco de dados
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Feedback -->
                    <div id="feedback" class="alert d-none" role="alert"></div>

                    <!-- Botão Próxima -->
                    <div class="text-center">
                        <button id="nextBtn" class="btn btn-primary btn-lg d-none" onclick="nextQuestion()">
                            Próxima Questão →
                        </button>
                    </div>

                    <!-- Resultado Final (oculto inicialmente) -->
                    <div id="resultCard" class="card border-0 shadow-sm d-none">
                        <div class="card-body text-center">
                            <h2 class="display-3 mb-3">🎉</h2>
                            <h3 class="mb-3">Quiz Finalizado!</h3>
                            <p class="lead mb-4">Sua pontuação final:</p>
                            <h1 class="display-1 text-primary mb-4"><span id="finalScore">0</span>/5</h1>
                            <p id="feedback-message" class="mb-4"></p>
                            <button class="btn btn-success btn-lg" onclick="restartQuiz()">
                                Jogar Novamente
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Dados do Quiz
        const questions = [
            {
                question: "O que significa Bootstrap?",
                options: [
                    "A) Um sistema operacional",
                    "B) Um framework CSS para desenvolvimento web",
                    "C) Uma linguagem de programação",
                    "D) Um banco de dados"
                ],
                correct: 1
            },
            {
                question: "Quantas colunas tem o sistema de Grid do Bootstrap?",
                options: [
                    "A) 10 colunas",
                    "B) 12 colunas",
                    "C) 16 colunas",
                    "D) 24 colunas"
                ],
                correct: 1
            },
            {
                question: "Qual classe é usada para criar um botão primário?",
                options: [
                    "A) btn-primary",
                    "B) button-primary",
                    "C) btn-main",
                    "D) primary-btn"
                ],
                correct: 0
            },
            {
                question: "O Bootstrap é baseado em qual pré-processador CSS?",
                options: [
                    "A) LESS",
                    "B) Stylus",
                    "C) Sass",
                    "D) PostCSS"
                ],
                correct: 2
            },
            {
                question: "Qual componente é usado para criar um carrossel?",
                options: [
                    "A) Slider",
                    "B) Carousel",
                    "C) Gallery",
                    "D) Slideshow"
                ],
                correct: 1
            }
        ];

        let currentQ = 0;
        let points = 0;
        let answered = false;

        function checkAnswer(button, isCorrect) {
            if (answered) return;
            
            answered = true;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                button.classList.add('correct');
                points++;
                document.getElementById('score').textContent = points;
                showFeedback('Correto! 🎉', 'success');
            } else {
                button.classList.add('incorrect');
                // Mostra a resposta correta
                buttons[questions[currentQ].correct].classList.add('correct');
                showFeedback('Ops! Resposta incorreta. 😕', 'danger');
            }

            document.getElementById('nextBtn').classList.remove('d-none');
        }

        function showFeedback(message, type) {
            const feedback = document.getElementById('feedback');
            feedback.className = `alert alert-${type}`;
            feedback.textContent = message;
            feedback.classList.remove('d-none');
        }

        function nextQuestion() {
            currentQ++;
            answered = false;

            if (currentQ < questions.length) {
                loadQuestion();
                document.getElementById('nextBtn').classList.add('d-none');
                document.getElementById('feedback').classList.add('d-none');
                
                // Atualiza progresso
                const progress = ((currentQ + 1) / questions.length) * 100;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('currentQuestion').textContent = currentQ + 1;
            } else {
                showResults();
            }
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('questionText').textContent = q.question;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-outline-primary btn-lg text-start option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(btn, index === q.correct);
                container.appendChild(btn);
            });
        }

        function showResults() {
            document.getElementById('quizCard').classList.add('d-none');
            document.getElementById('nextBtn').classList.add('d-none');
            document.getElementById('feedback').classList.add('d-none');
            document.getElementById('resultCard').classList.remove('d-none');
            document.getElementById('finalScore').textContent = points;

            let message = '';
            if (points === 5) message = '🏆 Perfeito! Você é um expert em Bootstrap!';
            else if (points >= 3) message = '👏 Muito bem! Você conhece bem o Bootstrap!';
            else message = '📚 Continue estudando! Você vai melhorar!';
            
            document.getElementById('feedback-message').textContent = message;
        }

        function restartQuiz() {
            currentQ = 0;
            points = 0;
            answered = false;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('currentQuestion').textContent = '1';
            document.getElementById('progressBar').style.width = '20%';
            
            document.getElementById('quizCard').classList.remove('d-none');
            document.getElementById('resultCard').classList.add('d-none');
            
            loadQuestion();
        }
    </script>
</body>
</html>
