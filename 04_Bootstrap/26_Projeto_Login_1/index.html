<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Login - Parte 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }
        .login-body {
            padding: 40px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: bold;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .social-login {
            border: 2px solid #e0e0e0;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .social-login:hover {
            border-color: #667eea;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card">
                    <!-- Cabeçalho -->
                    <div class="login-header">
                        <h2 class="mb-3">
                            <i class="bi bi-lock-fill"></i> 🔐
                        </h2>
                        <h3>Bem-vindo de Volta!</h3>
                        <p class="mb-0">Faça login para continuar</p>
                    </div>

                    <!-- Corpo do formulário -->
                    <div class="login-body">
                        <form>
                            <!-- Email -->
                            <div class="mb-4">
                                <label for="email" class="form-label fw-bold">
                                    📧 Email
                                </label>
                                <input 
                                    type="email" 
                                    class="form-control form-control-lg" 
                                    id="email" 
                                    placeholder="seu@email.com"
                                    required
                                >
                            </div>

                            <!-- Senha -->
                            <div class="mb-4">
                                <label for="senha" class="form-label fw-bold">
                                    🔑 Senha
                                </label>
                                <input 
                                    type="password" 
                                    class="form-control form-control-lg" 
                                    id="senha" 
                                    placeholder="Digite sua senha"
                                    required
                                >
                            </div>

                            <!-- Lembrar-me e Esqueci senha -->
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="lembrar">
                                    <label class="form-check-label" for="lembrar">
                                        Lembrar-me
                                    </label>
                                </div>
                                <a href="#" class="text-decoration-none">Esqueceu a senha?</a>
                            </div>

                            <!-- Botão de Login -->
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg btn-login">
                                    Entrar
                                </button>
                            </div>

                            <!-- Divider -->
                            <div class="text-center my-4">
                                <span class="text-muted">ou continue com</span>
                            </div>

                            <!-- Login Social -->
                            <div class="row g-3 mb-4">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100 social-login">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16">
                                            <path d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z"/>
                                        </svg>
                                        Google
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100 social-login">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-facebook" viewBox="0 0 16 16">
                                            <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z"/>
                                        </svg>
                                        Facebook
                                    </button>
                                </div>
                            </div>

                            <!-- Link para cadastro -->
                            <div class="text-center">
                                <p class="text-muted mb-0">
                                    Não tem uma conta? 
                                    <a href="#" class="text-decoration-none fw-bold">Cadastre-se</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Footer info -->
                <div class="text-center mt-4 text-white">
                    <p class="mb-0">© 2024 Seu Aplicativo. Todos os direitos reservados.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Prevenir envio do formulário (demonstração)
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            if (email && senha) {
                alert('Login bem-sucedido!\nEmail: ' + email);
                // Aqui você faria a requisição para o servidor
            }
        });

        // Adicionar feedback visual aos botões sociais
        document.querySelectorAll('.social-login').forEach(button => {
            button.addEventListener('click', function() {
                const provider = this.textContent.trim();
                alert('Login with ' + provider + ' clicado!');
            });
        });
    </script>
</body>
</html>
