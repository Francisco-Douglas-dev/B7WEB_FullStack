<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A base geral do CSS</title>
  <!-- Aula: Propriedades fundamentais do CSS (color, font-size, display) -->
  <style>
    body { font-family: Arial, sans-serif; }
    .caixa { display: inline-block; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>A base geral do CSS</h1>
  <p>Exemplos de propriedades básicas:</p>
  <div class="caixa">Elemento com <code>display</code>, <code>padding</code> e <code>border</code>.</div>
</body>
</html>
