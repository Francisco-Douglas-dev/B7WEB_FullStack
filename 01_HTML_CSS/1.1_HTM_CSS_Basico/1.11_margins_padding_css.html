<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Margins e Padding no CSS</title>
  <!-- Aula: Diferença entre margin (fora) e padding (dentro) -->
  <style>
    .externa { background:#f0f0f0; margin:20px; padding:8px; }
    .interna { background:#e0f7fa; margin:8px; padding:20px; }
  </style>
</head>
<body>
  <h1>Margins e Padding</h1>
  <div class="externa">Exemplo com <code>margin</code> maior e <code>padding</code> menor.</div>
  <div class="interna">Exemplo com <code>padding</code> maior e <code>margin</code> menor.</div>
</body>
</html>
