<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Links (1/2)</title>
  <!-- Aula: Como criar links com <a> e atributos target/rel -->
</head>
<body>
  <h1>Links (1/2)</h1>
  <p>Link interno: <a href="#secao">Ir para seção</a></p>
  <p>Link externo (nova aba): <a href="https://example.com" target="_blank" rel="noopener">Example</a></p>

  <h2 id="secao">Seção de destino</h2>
  <p>Alvo do link interno.</p>
</body>
</html>
