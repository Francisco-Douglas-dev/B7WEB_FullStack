<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dicas sobre Width/Height</title>
  <!-- Aula: Boas práticas e dicas sobre width/height (box-sizing, responsividade) -->
  <style>
    * { box-sizing: border-box; }
    .card { width:100%; max-width:400px; padding:12px; border:1px solid #ccc; }
  </style>
</head>
<body>
  <h1>Dicas sobre Width/Height</h1>
  <p>Use <code>box-sizing: border-box;</code> para que padding não aumente a largura total do elemento.</p>
  <div class="card">Card responsivo com <code>max-width</code>.</div>
</body>
</html>
