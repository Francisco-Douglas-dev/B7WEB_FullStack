<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tags Básicas (1/2)</title>
  <!-- Aula: Tags Básicas (1/2) - exemplos de estrutura, cabeçalhos e parágrafos -->
</head>
<body>
  <header>
    <h1>Tags Básicas (1/2)</h1>
  </header>

  <section>
    <h2>Estrutura</h2>
    <p>O documento começa com <code>&lt;!DOCTYPE html&gt;</code> e contém as tags <code>&lt;html&gt;</code>, <code>&lt;head&gt;</code> e <code>&lt;body&gt;</code>.</p>
  </section>

  <section>
    <h2>Cabeçalhos e parágrafos</h2>
    <h1>Exemplo de h1</h1>
    <p>Parágrafo de exemplo. Use <code>&lt;strong&gt;</code> para ênfase forte e <code>&lt;em&gt;</code> para ênfase leve.</p>
  </section>
</body>
</html>
