<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>O que é e como usar o CSS? (2/2)</title>
  <!-- Aula: Exemplo de CSS interno e uso de seletores simples -->
  <style>
    .destaque { color: white; background: #007acc; padding: 6px; }
  </style>
</head>
<body>
  <h1>CSS Interno</h1>
  <p class="destaque">Esse parágrafo usa uma classe definida no &lt;style&gt; do &lt;head&gt;.</p>

  <h2>Seletores</h2>
  <p id="paragrafo">Seletores por ID, classe e tag permitem aplicar estilos específicos.</p>
</body>
</html>
