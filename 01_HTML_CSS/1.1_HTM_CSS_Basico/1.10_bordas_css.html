<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bordas no CSS</title>
  <!-- Aula: Propriedades de borda (border, border-radius, border-style) -->
  <style>
    .box { border: 4px solid #333; padding: 10px; margin: 8px; }
    .rounded { border-radius: 12px; border: 2px dashed #007acc; }
  </style>
</head>
<body>
  <h1>Bordas no CSS</h1>
  <div class="box">Borda sólida (4px)</div>
  <div class="rounded">Borda arredondada e tracejada</div>
</body>
</html>
