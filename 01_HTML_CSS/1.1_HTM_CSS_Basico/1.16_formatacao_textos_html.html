<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formatação de textos no HTML</title>
  <!-- Aula: Tags de formatação como strong, em, small, sub, sup -->
</head>
<body>
  <h1>Formatação de textos</h1>
  <p>Negrito: <strong>texto</strong></p>
  <p>Itálico: <em>texto</em></p>
  <p>Menor: <small>texto pequeno</small></p>
  <p>Subscrito: H<sub>2</sub>O</p>
  <p>Sobrescrito: x<sup>2</sup></p>
</body>
</html>
