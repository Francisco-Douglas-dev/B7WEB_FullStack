<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unidades de medida absolutas</title>
  <!-- px, cm, mm, in, pt, pc -->
  <style>
    .px { width: 200px; height: 50px; background:#ffd; }
    .cm { width: 6cm; height: 2cm; background:#dfd; }
  </style>
</head>
<body>
  <h1>Unidades absolutas</h1>
  <div class="px">Box em pixels (200px)</div>
  <div class="cm">Box em centímetros (6cm)</div>
  <p>Dica: unidades absolutas têm tamanho fixo e nem sempre são ideais para responsividade.</p>
</body>
</html>
