<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meta tags (social sharing)</title>
  <link rel="stylesheet" href="5.22_meta_social.css">
  <!-- Exemplos de meta tags para compartilhamento em redes sociais -->
  <meta property="og:title" content="Título da página">
  <meta property="og:description" content="Descrição breve para social sharing">
  <meta property="og:image" content="https://example.com/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <h1>Meta tags para social sharing</h1>
  <p>As tags Open Graph e Twitter Card ajudam a controlar como sua página aparece em redes sociais.</p>
</body>
</html>
