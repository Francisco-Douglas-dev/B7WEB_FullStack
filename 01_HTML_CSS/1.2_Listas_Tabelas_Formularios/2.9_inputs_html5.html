<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inputs no HTML5</title>
  <!-- Exemplos de novos tipos HTML5: email, tel, url, date, range -->
</head>
<body>
  <h1>Inputs no HTML5</h1>
  <p>Email: <input type="email" name="email" placeholder="nome@exemplo.com"></p>
  <p>Telefone: <input type="tel" name="tel" placeholder="(99) 99999-9999"></p>
  <p>URL: <input type="url" name="site" placeholder="https://"></p>
  <p>Data: <input type="date" name="data"></p>
  <p>Range: <input type="range" name="volume" min="0" max="10"></p>
</body>
</html>
