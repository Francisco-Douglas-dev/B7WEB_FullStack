<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Listas no HTML</title>
  <!-- Exemplos: ul, ol, dl -->
</head>
<body>
  <h1>Listas no HTML</h1>
  <h2>Lista não ordenada (&lt;ul&gt;)</h2>
  <ul>
    <li>Maçã</li>
    <li>Banana</li>
    <li>Laranja</li>
  </ul>

  <h2>Lista ordenada (&lt;ol&gt;)</h2>
  <ol>
    <li>Primeiro</li>
    <li>Segundo</li>
  </ol>

  <h2>Lista de descrição (&lt;dl&gt;)</h2>
  <dl>
    <dt>HTML</dt>
    <dd>Linguagem de marcação para páginas web.</dd>
    <dt>CSS</dt>
    <dd>Linguagem de estilos.</dd>
  </dl>
</body>
</html>
