<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adicionando Fontes Externas</title>
  <!-- Exemplo usando Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; }
    .titulo { font-weight:700; }
  </style>
</head>
<body>
  <h1 class="titulo">Fonte externa: Roboto</h1>
  <p>Esta página carrega uma fonte do Google Fonts e a aplica ao documento.</p>
</body>
</html>
