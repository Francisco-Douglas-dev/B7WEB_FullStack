<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Textarea</title>
  <!-- Elemento multiline de entrada de texto -->
</head>
<body>
  <h1>Textarea</h1>
  <form>
    <label for="mensagem">Mensagem:</label><br>
    <textarea id="mensagem" name="mensagem" rows="5" cols="40" placeholder="Escreva sua mensagem..."></textarea>
  </form>
</body>
</html>
