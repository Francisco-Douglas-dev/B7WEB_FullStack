<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Input</title>
  <!-- Exemplos de tipos de input básicos: text, password, number -->
</head>
<body>
  <h1>Inputs</h1>
  <p>Texto: <input type="text" name="texto" placeholder="Digite algo"></p>
  <p>Senha: <input type="password" name="senha"></p>
  <p>Número: <input type="number" name="numero" min="0" max="100"></p>
</body>
</html>
