<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formatação de textos no CSS (2/2)</title>
  <!-- Demonstração de text-align, text-transform, letter-spacing, word-spacing -->
  <style>
    .central { text-align: center; }
    .maiusculas { text-transform: uppercase; }
    .espacoletras { letter-spacing: 2px; }
  </style>
</head>
<body>
  <h1>Formatação de textos no CSS (2/2)</h1>
  <p class="central">Texto centralizado (<code>text-align</code>).</p>
  <p class="maiusculas">Texto em MAIÚSCULAS (<code>text-transform</code>).</p>
  <p class="espacoletras">Espaço entre letras aumentado (<code>letter-spacing</code>).</p>
</body>
</html>
