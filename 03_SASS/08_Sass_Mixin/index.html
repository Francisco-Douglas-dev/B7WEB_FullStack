<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sass: Mixin</title>
    <!-- CSS compilado com mixins -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Demonstração de Mixins no Sass -->
    <div class="container">
        <header class="page-header">
            <h1>Sass Mixins</h1>
            <p>Reutilize blocos de código com facilidade</p>
        </header>

        <main class="content">
            <section class="mixin-examples">
                <div class="card card-gradient">
                    <h2>Mixin com Gradiente</h2>
                    <p>Este card usa um mixin para criar gradiente</p>
                </div>

                <div class="card card-shadow">
                    <h2>Mixin com Sombra</h2>
                    <p>Este card usa um mixin para sombras</p>
                </div>

                <div class="card card-responsive">
                    <h2>Mixin Responsivo</h2>
                    <p>Este card usa um mixin para media queries</p>
                </div>
            </section>

            <section class="buttons">
                <button class="btn btn-primary">Botão Primário</button>
                <button class="btn btn-secondary">Botão Secundário</button>
                <button class="btn btn-success">Botão Sucesso</button>
            </section>
        </main>

        <footer class="page-footer">
            <p>💡 Mixins são como funções que retornam blocos de CSS!</p>
        </footer>
    </div>
</body>
</html>
