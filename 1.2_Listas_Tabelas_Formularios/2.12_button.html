<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Button</title>
  <!-- Tipos de botões: submit, reset, button -->
</head>
<body>
  <h1>Button</h1>
  <form>
    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
    <button type="button" onclick="alert('Clique!')">Clique</button>
  </form>
</body>
</html>
