<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tags Fieldset e Legend</title>
  <!-- Agrupamento de campos com fieldset e legend para melhorar semântica -->
</head>
<body>
  <h1>Fieldset e Legend</h1>
  <form>
    <fieldset>
      <legend>Informações pessoais</legend>
      <label>Nome: <input type="text"></label><br>
      <label>Idade: <input type="number"></label>
    </fieldset>
  </form>
</body>
</html>
