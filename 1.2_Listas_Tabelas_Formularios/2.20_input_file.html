<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Input type file</title>
  <!-- Exemplo simples de upload de arquivo (front-end) -->
</head>
<body>
  <h1>Input type="file"</h1>
  <form action="#" method="post" enctype="multipart/form-data">
    <label for="arquivo">Escolha um arquivo:</label>
    <input id="arquivo" type="file" name="arquivo">
    <p>Você pode limitar tipos com accept="image/*" etc.</p>
    <button type="submit">Enviar</button>
  </form>
</body>
</html>
