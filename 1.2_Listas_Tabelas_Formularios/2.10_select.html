<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Select</title>
  <!-- Exemplo de <select> com opções simples e múltipla seleção -->
</head>
<body>
  <h1>Select</h1>
  <form>
    <label for="cores">Escolha uma cor:</label>
    <select id="cores" name="cores">
      <option value="vermelho">Vermelho</option>
      <option value="verde">Verde</option>
      <option value="azul">Azul</option>
    </select>

    <p>Seleção múltipla:</p>
    <select multiple size="3">
      <option>Opção A</option>
      <option>Opção B</option>
      <option>Opção C</option>
    </select>
  </form>
</body>
</html>
