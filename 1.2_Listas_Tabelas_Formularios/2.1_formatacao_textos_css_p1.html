<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formatação de textos no CSS (1/2)</title>
  <!-- Demonstração de propriedades de texto: font-size, font-weight, line-height -->
  <style>
    .grande { font-size: 24px; }
    .negrito { font-weight: 700; }
    .espacado { line-height: 2; }
  </style>
</head>
<body>
  <h1>Formatação de textos no CSS (1/2)</h1>
  <p class="grande">Texto com tamanho maior (<code>font-size</code>).</p>
  <p class="negrito">Texto em negrito (<code>font-weight</code>).</p>
  <p class="espacado">Texto com espaçamento maior entre linhas (<code>line-height</code>).</p>
</body>
</html>
