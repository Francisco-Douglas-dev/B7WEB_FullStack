<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Input type hidden</title>
  <!-- Campo hidden para enviar dados que não devem aparecer na interface -->
</head>
<body>
  <h1>Input type="hidden"</h1>
  <form action="#" method="post">
    <input type="hidden" name="session_id" value="abc123">
    <p>O campo hidden não é visível, mas é enviado no formulário.</p>
    <button type="submit">Enviar</button>
  </form>
</body>
</html>
