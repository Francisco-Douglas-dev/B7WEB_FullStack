<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tabelas no CSS</title>
  <!-- Estilizando tabelas: border-collapse, padding, zebra striping -->
  <style>
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; border: 1px solid #ccc; }
    tbody tr:nth-child(odd) { background:#f9f9f9; }
  </style>
</head>
<body>
  <h1>Tabelas no CSS</h1>
  <table>
    <thead>
      <tr><th>Produto</th><th>Preço</th></tr>
    </thead>
    <tbody>
      <tr><td>Caneta</td><td>R$ 2,50</td></tr>
      <tr><td>Caderno</td><td>R$ 12,00</td></tr>
    </tbody>
  </table>
</body>
</html>
