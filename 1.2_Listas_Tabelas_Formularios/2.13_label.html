<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Label</title>
  <!-- Uso do elemento <label> para melhorar acessibilidade -->
</head>
<body>
  <h1>Label</h1>
  <form>
    <label for="usuario">Usuário:</label>
    <input id="usuario" name="usuario" type="text">
    <p>Ao clicar no texto do label, o campo associado recebe foco.</p>
  </form>
</body>
</html>
