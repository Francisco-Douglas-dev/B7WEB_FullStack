<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tabelas no HTML</title>
  <!-- Estrutura básica de tabelas: table, thead, tbody, tr, th, td -->
</head>
<body>
  <h1>Tabelas no HTML</h1>
  <table>
    <caption>Tabela de exemplo</caption>
    <thead>
      <tr><th>Nome</th><th>Idade</th></tr>
    </thead>
    <tbody>
      <tr><td>Ana</td><td>28</td></tr>
      <tr><td>Carlos</td><td>33</td></tr>
    </tbody>
  </table>
</body>
</html>
